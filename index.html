<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mert@archive</title>
<meta name="description" content="Technical documents and notes by Mert Ertugral.">

<!-- ============================================================
     SETUP (one time)
     1) Fill CONFIG below: GitHub username + repo name + label.
        - Public repo  -> label:"public"  (served on GitHub Pages)
        - Private repo -> label:"private" (needs GitHub Pro for Pages,
          or just open index.html locally / via the private Pages URL)
     2) Make a "docs" folder in the repo. Inside it, nest folders
        as deep as you like: docs/migration/sgk/notes/...
     3) Everything lists automatically as a collapsible tree.

     ADMIN (edit from the browser like a file manager)
     - Click "admin" (bottom), paste a fine-grained GitHub token
       with Contents: Read & write on THIS repo only.
     - Create folders, write notes, upload files, delete — all
       saved straight to the repo. Token stays in your browser.
     ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0E1116; --panel:#12161D; --line:#222A35;
    --ink:#D6DBE1; --muted:#788292; --dim:#4E5866;
    --accent:#5C9CFF; --ok:#3FB68B; --danger:#E06C75; --warn:#E5A663;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
  html,body{background:var(--bg)}
  body{color:var(--ink);font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
  .wrap{max-width:1180px;margin:0 auto;padding:0 32px}

  header{padding:48px 0 0}
  .prompt{color:var(--muted);font-size:13.5px}
  .prompt b{color:var(--accent);font-weight:500}
  .badge{font-size:11.5px;border:1px solid var(--line);border-radius:5px;padding:2px 9px;margin-left:8px;color:var(--dim)}
  .badge.pub{color:var(--ok);border-color:rgba(63,182,139,.4)}
  .badge.priv{color:var(--warn);border-color:rgba(229,166,99,.4)}
  h1{font-size:22px;font-weight:600;margin:12px 0 4px;letter-spacing:-.01em}
  .lede{color:var(--muted);font-size:14px}

  .tree{margin:28px 0 0;border:1px solid var(--line);border-radius:10px;background:var(--panel);overflow:hidden}
  .tree-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--line);color:var(--dim);font-size:12.5px}
  .dots{display:flex;gap:6px}
  .dots i{width:10px;height:10px;border-radius:50%;background:var(--line);display:block}
  .bar-actions{display:flex;gap:10px}
  .bar-btn{font-size:13px;color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:5px 14px;transition:.12s;background:var(--bg)}
  .bar-btn:hover,.bar-btn:focus-visible{color:#fff;background:var(--accent);border-color:var(--accent);outline:none}
  .tree-body{padding:18px 20px 22px;overflow-x:auto;min-height:160px}
  .root{color:var(--muted);font-size:13.5px;padding-bottom:4px}

  .row{display:flex;align-items:center;gap:4px;padding:7px 8px;border-radius:6px;min-height:38px}
  .row:hover{background:rgba(92,156,255,.07)}
  .branch{color:var(--dim);white-space:pre;flex:none}
  .fold{color:var(--accent);font-weight:600;text-align:left;font-size:15px}
  .fold:hover{text-decoration:underline}
  .fold-count{color:var(--dim);font-size:12.5px;margin-left:12px;flex:none;background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:1px 10px}
  .fname{color:var(--ink);font-size:14.5px}
  .fname.note{cursor:pointer}
  .fname.note:hover{color:var(--accent);text-decoration:underline}
  .fname .ext{color:var(--ok)}
  .meta{margin-left:auto;padding-left:24px;display:flex;gap:8px;align-items:center;flex:none}
  .meta .size{color:var(--dim);font-size:12.5px;min-width:62px;text-align:right}
  .act{font-size:12.5px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:3px 11px;transition:.12s;background:var(--bg);white-space:nowrap}
  .act:hover,.act:focus-visible{color:#fff;background:var(--accent);border-color:var(--accent);outline:none}
  .act.del:hover,.act.del:focus-visible{color:#fff;background:var(--danger);border-color:var(--danger)}
  .collapsed{display:none}

  .statline{display:flex;flex-wrap:wrap;gap:6px 24px;color:var(--dim);font-size:13px;padding:16px 2px 0}
  .statline b{color:var(--muted);font-weight:500}
  .toast{color:var(--ok)} .toast.err{color:var(--danger)}

  footer{margin-top:56px;border-top:1px solid var(--line);padding:20px 0 48px;color:var(--dim);font-size:12.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  footer button{color:var(--dim);font-size:12.5px}
  footer button:hover{color:var(--accent)}

  .overlay{position:fixed;inset:0;background:rgba(8,10,14,.74);display:none;align-items:flex-start;justify-content:center;padding:6vh 24px 24px;z-index:10}
  .overlay.open{display:flex}
  .modal{width:100%;max-width:820px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:26px 28px}
  .modal h2{font-size:16px;font-weight:600;margin-bottom:16px}
  .modal label{display:block;font-size:12.5px;color:var(--muted);margin:12px 0 5px}
  .modal input[type=text],.modal input[type=password],.modal textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--ink);font:inherit;font-size:14px;padding:10px 12px}
  .modal textarea{min-height:340px;resize:vertical;line-height:1.7}
  .modal input:focus,.modal textarea:focus{outline:none;border-color:var(--accent)}
  .hintline{font-size:12px;color:var(--dim);margin-top:6px}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .btn{font-size:14px;border:1px solid var(--line);border-radius:6px;padding:8px 18px;color:var(--muted)}
  .btn:hover{color:var(--ink);border-color:var(--muted)}
  .btn.primary{color:#fff;background:var(--accent);border-color:var(--accent)}
  .btn.primary:hover{filter:brightness(1.1)}

  .viewer .note-body{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:20px;white-space:pre-wrap;font-size:14px;line-height:1.8;max-height:60vh;overflow:auto;color:var(--ink)}
  .viewer .note-title{font-size:16px;font-weight:600;margin-bottom:12px}

  @media (max-width:720px){
    .wrap{padding:0 18px}
    .row{flex-wrap:wrap}
    .meta{margin-left:30px;padding-left:0;flex-wrap:wrap}
  }
</style>
</head>
<body>

<header class="wrap">
  <div class="prompt"><b>mert@archive</b>:~$ tree ./docs <span class="badge" id="repoBadge"></span></div>
  <h1>Document Archive</h1>
  <p class="lede">Technical guides, notes and tool manuals.</p>
</header>

<div class="wrap">
  <div class="tree">
    <div class="tree-bar">
      <span class="dots"><i></i><i></i><i></i></span>
      <span id="topInfo">loading…</span>
      <span class="bar-actions" id="adminActions" hidden>
        <button class="bar-btn" id="btnNewFolder">+ folder</button>
        <button class="bar-btn" id="btnNewNote">+ note</button>
        <button class="bar-btn" id="btnUpload">+ upload</button>
      </span>
    </div>
    <div class="tree-body" id="tree"></div>
  </div>
  <div class="statline" id="stats"></div>
</div>

<footer class="wrap">
  <span>© <span id="year"></span> Mert Ertuğral</span>
  <button id="btnAdmin">admin</button>
</footer>

<div class="overlay" id="overlay"><div class="modal" id="modalBox" role="dialog" aria-modal="true"></div></div>
<input type="file" id="filePick" hidden>

<script>
/* ==============================================================
   CONFIG — fill once per repo.
   ============================================================== */
const CONFIG = {
  user:   "",          // e.g. "ertugralmert"
  repo:   "",          // e.g. "archive-public"  or  "archive-private"
  rootDir:"docs",
  label:  "public"     // "public" or "private"  (badge + tone only)
};
const OWNER_NAME = "Mert Ertuğral";

/* Demo, shown only when CONFIG is empty / unreachable */
const DEMO = [
  {path:"migration/sgk/liberty-notes.md", size:4200},
  {path:"migration/liberty-migration-guide.pdf", size:2515000},
  {path:"training/watsonx-data-training.pdf", size:1153000},
  {path:"tools/depcve/depcve-scanner-manual.pdf", size:870000}
];

/* ============ engine ============ */
const $ = id => document.getElementById(id);
const treeEl = $("tree");
let TOKEN=null, BRANCH="main", ITEMS=[], COLLAPSED={};
const TKEY = "archive_token_"+(CONFIG.repo||"x");

const isNote = n => /\.(md|txt)$/i.test(n);
// file types browsers can preview in a new tab (no download needed)
const canView = n => /\.(pdf|png|jpe?g|gif|webp|svg|json|csv|log|xml|html?)$/i.test(n);
const fmtSize = b => b==null?"":b<1024?b+" B":b<1048576?(b/1024).toFixed(0)+" KB":(b/1048576).toFixed(1)+" MB";
const esc = s => (s+"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const b64 = s => btoa(unescape(encodeURIComponent(s)));
const fromB64 = s => decodeURIComponent(escape(atob((s||"").replace(/\n/g,""))));
const api = p => `https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}${p}`;
const rawUrl = p => `https://raw.githubusercontent.com/${CONFIG.user}/${CONFIG.repo}/${BRANCH}/${CONFIG.rootDir}/${p}`;
const live = () => CONFIG.user && CONFIG.repo;
const headers = () => { const h={"Accept":"application/vnd.github+json"}; if(TOKEN)h.Authorization="Bearer "+TOKEN; return h; };

function toast(msg,err){ $("stats").innerHTML = `<span><b>${ITEMS.length}</b> files</span>` + (msg?` <span class="toast${err?" err":""}">${esc(msg)}</span>`:""); }

async function loadList(){
  if(live()){
    try{
      const repo = await (await fetch(api(""),{headers:headers()})).json();
      BRANCH = repo.default_branch || "main";
      // cache-bust so a just-saved file shows up immediately
      const t = await (await fetch(api(`/git/trees/${BRANCH}?recursive=1&_=${Date.now()}`),{headers:headers(),cache:"no-store"})).json();
      ITEMS = (t.tree||[])
        .filter(x=>x.type==="blob" && x.path.startsWith(CONFIG.rootDir+"/"))
        .map(x=>({path:x.path.slice(CONFIG.rootDir.length+1), size:x.size, sha:x.sha}))
        .filter(x=>!x.path.endsWith(".gitkeep"));
      // keep empty folders (those that only had a .gitkeep) visible
      (t.tree||[])
        .filter(x=>x.type==="blob" && x.path.endsWith("/.gitkeep") && x.path.startsWith(CONFIG.rootDir+"/"))
        .forEach(x=>{
          const folder = x.path.slice(CONFIG.rootDir.length+1, -("/.gitkeep".length));
          if(!ITEMS.some(it=>it.path.startsWith(folder+"/")))
            ITEMS.push({path:folder+"/.keep", size:null, sha:null, placeholder:true});
        });
      render(); toast(""); return;
    }catch(e){}
  }
  ITEMS = DEMO.slice(); render();
  toast(live()?"could not reach GitHub":"demo mode — fill CONFIG", true);
}

/* build nested tree object from flat paths */
function buildTree(){
  const root = {folders:{}, files:[]};
  ITEMS.forEach(it=>{
    const parts = it.path.split("/");
    const fname = parts.pop();
    let node = root;
    parts.forEach(p=>{ node.folders[p] = node.folders[p] || {folders:{}, files:[]}; node = node.folders[p]; });
    node.files.push({name:fname, size:it.size, sha:it.sha, path:it.path});
  });
  return root;
}

function countFiles(node){
  let n = node.files.filter(f=>!f.placeholder).length;
  for(const k in node.folders) n += countFiles(node.folders[k]);
  return n;
}

function renderNode(node, prefix, dirPath, out){
  const folderNames = Object.keys(node.folders).sort();
  const files = node.files.filter(f=>!f.placeholder).sort((a,b)=>a.name.localeCompare(b.name));
  const entries = [...folderNames.map(n=>({t:"d",n})), ...files.map(f=>({t:"f",f}))];

  entries.forEach((e,i)=>{
    const last = i===entries.length-1;
    const branch = prefix + (last?"└── ":"├── ");
    const childPrefix = prefix + (last?"    ":"│   ");
    if(e.t==="d"){
      const full = dirPath ? dirPath+"/"+e.n : e.n;
      const open = !COLLAPSED[full];
      const child = node.folders[e.n];
      out.push(`<div class="row">
        <span class="branch">${branch}</span>
        <button class="fold" data-fold="${esc(full)}">📁 ${esc(e.n)}/</button>
        <span class="fold-count">${countFiles(child)}</span>
        ${TOKEN?`<span class="meta">
          <button class="act" data-addhere="${esc(full)}">+ here</button>
          <button class="act" data-renamefolder="${esc(full)}">rename</button>
          <button class="act del" data-delfolder="${esc(full)}">del</button>
        </span>`:""}
      </div>`);
      if(open){ const inner=[]; renderNode(child, childPrefix, full, inner); out.push(`<div data-body="${esc(full)}">${inner.join("")}</div>`); }
    }else{
      const f=e.f, dot=f.name.lastIndexOf(".");
      const base=dot>0?f.name.slice(0,dot):f.name, ext=dot>0?f.name.slice(dot):"";
      const href = live()?rawUrl(f.path):CONFIG.rootDir+"/"+f.path;
      const note = isNote(f.name), view = canView(f.name);
      // name is clickable when it's a note (in-site viewer) or a browser-viewable file (new tab)
      const nameAttrs = note ? `data-open="${esc(f.path)}" tabindex="0" role="button"`
                     : view ? `data-view="${esc(href)}" tabindex="0" role="button"` : "";
      out.push(`<div class="row">
        <span class="branch">${branch}</span>
        <span class="fname ${(note||view)?"note":""}" ${nameAttrs}>${esc(base)}<span class="ext">${esc(ext)}</span></span>
        <span class="meta">
          <span class="size">${fmtSize(f.size)}</span>
          ${(note||view)?`<a class="act" href="${href}" target="_blank" rel="noopener">open ↗</a>`:""}
          ${note?`<button class="act" data-pdf="${esc(f.path)}">pdf ↓</button>`:`<a class="act" href="${href}" download>download ↓</a>`}
          ${TOKEN&&note?`<button class="act" data-edit="${esc(f.path)}" data-sha="${f.sha||""}">edit</button>`:""}
          ${TOKEN?`<button class="act" data-rename="${esc(f.path)}" data-sha="${f.sha||""}">rename</button>`:""}
          ${TOKEN?`<button class="act del" data-del="${esc(f.path)}" data-sha="${f.sha||""}">del</button>`:""}
        </span>
      </div>`);
    }
  });
}

function render(){
  const root = buildTree();
  const out = [`<div class="root">.</div>`];
  renderNode(root, "", "", out);
  if(!ITEMS.length) out.push(`<div style="color:var(--dim);padding:8px 0">empty — add your first folder</div>`);
  treeEl.innerHTML = out.join("");
  const folderTotal = (function c(n){let k=Object.keys(n.folders).length;for(const f in n.folders)k+=c(n.folders[f]);return k;})(root);
  const realFiles = ITEMS.filter(it=>!it.placeholder).length;
  $("topInfo").textContent = `${folderTotal} folders · ${realFiles} files`;
}

/* ---------- clicks ---------- */
treeEl.addEventListener("click", e=>{
  const fold=e.target.closest("[data-fold]");
  if(fold){ const f=fold.dataset.fold; COLLAPSED[f]=!COLLAPSED[f]; render(); return; }
  const add=e.target.closest("[data-addhere]"); if(add) return newNote(add.dataset.addhere);
  const ed=e.target.closest("[data-edit]"); if(ed) return editNote(ed.dataset.edit, ed.dataset.sha);
  const rn=e.target.closest("[data-rename]"); if(rn) return renameFile(rn.dataset.rename, rn.dataset.sha);
  const rnf=e.target.closest("[data-renamefolder]"); if(rnf) return renameFolder(rnf.dataset.renamefolder);
  const dlf=e.target.closest("[data-delfolder]"); if(dlf) return delFolder(dlf.dataset.delfolder);
  const op=e.target.closest("[data-open]"); if(op) return viewNote(op.dataset.open);
  const vw=e.target.closest("[data-view]"); if(vw){ window.open(vw.dataset.view,"_blank","noopener"); return; }
  const pd=e.target.closest("[data-pdf]"); if(pd) return exportPdf(pd.dataset.pdf);
  const dl=e.target.closest("[data-del]"); if(dl) return delFile(dl.dataset.del, dl.dataset.sha);
});
treeEl.addEventListener("keydown", e=>{ if(e.key==="Enter"&&e.target.dataset){ if(e.target.dataset.open) viewNote(e.target.dataset.open); else if(e.target.dataset.view) window.open(e.target.dataset.view,"_blank","noopener"); } });

/* ---------- modal ---------- */
function openModal(h){ $("modalBox").innerHTML=h; $("overlay").classList.add("open"); }
function closeModal(){ $("overlay").classList.remove("open"); }
$("overlay").addEventListener("click",e=>{ if(e.target===$("overlay")) closeModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });
function allFolders(){ const s=new Set(); ITEMS.forEach(it=>{const p=it.path.split("/");p.pop();let cur="";p.forEach(x=>{cur=cur?cur+"/"+x:x;s.add(cur);});}); return [...s].sort(); }

/* ---------- notes ---------- */
async function fetchNote(path){ const r=await fetch(live()?rawUrl(path):CONFIG.rootDir+"/"+path); if(!r.ok)throw 0; return r.text(); }
async function viewNote(path){
  try{
    const text=await fetchNote(path);
    const title=path.split("/").pop().replace(/\.(md|txt)$/i,"");
    openModal(`<div class="viewer"><div class="note-title">${esc(title)}</div>
      <div class="note-body">${esc(text)}</div>
      <div class="modal-actions"><button class="btn" id="mClose">close</button>
      <button class="btn primary" id="vPdf">export pdf ↓</button></div></div>`);
    $("mClose").onclick=closeModal; $("vPdf").onclick=()=>exportPdf(path);
  }catch(e){ toast("could not open note",true); }
}

/* branded PDF via print template */
async function exportPdf(path){
  let text=""; try{ text=await fetchNote(path); }catch(e){ return toast("could not load note",true); }
  const title=path.split("/").pop().replace(/\.(md|txt)$/i,"").replace(/[-_]/g," ");
  const date=new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"});
  const w=window.open("","_blank"); if(!w) return toast("allow popups to export pdf",true);
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${esc(title)}</title><style>
    @page{margin:24mm 20mm}
    body{font-family:Georgia,'Times New Roman',serif;color:#1B1F24;line-height:1.7;font-size:12.5pt;margin:0}
    .head{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid #1B1F24;padding-bottom:8px;margin-bottom:28px;font-family:'Helvetica Neue',Arial,sans-serif}
    .who{font-size:13pt;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
    .what{font-size:9pt;color:#5B6470;letter-spacing:.08em}
    h1{font-family:'Helvetica Neue',Arial,sans-serif;font-size:17pt;margin:0 0 4px;text-transform:capitalize}
    .date{font-family:'Helvetica Neue',Arial,sans-serif;font-size:9.5pt;color:#5B6470;margin-bottom:26px}
    pre{white-space:pre-wrap;font:inherit;margin:0}
    .foot{margin-top:40px;padding-top:8px;border-top:1px solid #C8CCD2;font-family:'Helvetica Neue',Arial,sans-serif;font-size:8.5pt;color:#5B6470;display:flex;justify-content:space-between}
  </style></head><body>
    <div class="head"><span class="who">${esc(OWNER_NAME)}</span><span class="what">DOCUMENT ARCHIVE</span></div>
    <h1>${esc(title)}</h1><div class="date">${date}</div><pre>${esc(text)}</pre>
    <div class="foot"><span>${esc(OWNER_NAME)}</span><span>${date}</span></div>
  <\/body></html>`);
  w.document.close(); w.onload=()=>w.print(); setTimeout(()=>{try{w.print()}catch(e){}},600);
}

/* ---------- admin token ---------- */
$("btnAdmin").onclick=()=>{
  if(TOKEN){ TOKEN=null; try{localStorage.removeItem(TKEY)}catch(e){} $("adminActions").hidden=true; render(); toast("admin off"); return; }
  openModal(`<h2>Admin access · ${CONFIG.label}</h2>
    <label>GitHub token — Contents: Read &amp; write on this repo</label>
    <input type="password" id="tok" autocomplete="off">
    <label style="display:flex;align-items:center;gap:8px;margin-top:12px;cursor:pointer">
      <input type="checkbox" id="remember" checked style="width:auto"> keep me signed in on this device
    </label>
    <div class="hintline">If checked, the token is saved in this browser so refresh keeps you in. Uncheck on shared computers.</div>
    <div class="modal-actions"><button class="btn" id="mCancel">cancel</button><button class="btn primary" id="mOk">unlock</button></div>`);
  $("mCancel").onclick=closeModal;
  $("mOk").onclick=async()=>{
    const t=$("tok").value.trim(); if(!t)return; TOKEN=t;
    const r=await fetch(api(""),{headers:headers()});
    if(!r.ok){ TOKEN=null; return toast("token rejected",true); }
    try{ if($("remember").checked) localStorage.setItem(TKEY,t); else localStorage.removeItem(TKEY); }catch(e){}
    closeModal(); $("adminActions").hidden=false; render(); toast("admin on");
  };
  $("tok").focus();
};

/* ---------- create folder (via a .gitkeep placeholder) ---------- */
$("btnNewFolder").onclick=()=>{
  openModal(`<h2>New folder</h2>
    <label>Path (use / to nest, e.g. migration/sgk/notes)</label>
    <input type="text" id="fPath" list="folderList" placeholder="migration/sgk">
    <datalist id="folderList">${allFolders().map(f=>`<option value="${esc(f)}">`).join("")}</datalist>
    <div class="hintline">Empty folders need a placeholder; a hidden .gitkeep is added.</div>
    <div class="modal-actions"><button class="btn" id="mCancel">cancel</button><button class="btn primary" id="mOk">create</button></div>`);
  $("mCancel").onclick=closeModal;
  $("mOk").onclick=async()=>{
    const p=$("fPath").value.trim().replace(/^\/+|\/+$/g,""); if(!p)return;
    const path=`${CONFIG.rootDir}/${p}/.gitkeep`;
    const r=await fetch(api(`/contents/${path}`),{method:"PUT",headers:headers(),body:JSON.stringify({message:`folder: ${p}`,content:b64(""),branch:BRANCH})});
    if(!r.ok)return toast("create failed",true);
    closeModal(); await loadList(); toast("folder created ✓");
  };
};

/* ---------- new note ---------- */
function newNote(preFolder){
  const folders=allFolders();
  openModal(`<h2>New note</h2>
    <label>Folder (type to nest, e.g. migration/sgk)</label>
    <input type="text" id="nFolder" list="folderList" value="${esc(preFolder||folders[0]||"notes")}">
    <datalist id="folderList">${folders.map(f=>`<option value="${esc(f)}">`).join("")}</datalist>
    <label>Title</label><input type="text" id="nTitle" placeholder="liberty classloader findings">
    <label>Note</label><textarea id="nBody" placeholder="Write here…"></textarea>
    <div class="modal-actions"><button class="btn" id="mCancel">cancel</button><button class="btn primary" id="mSave">save</button></div>`);
  $("mCancel").onclick=closeModal;
  $("mSave").onclick=async()=>{
    const folder=$("nFolder").value.trim().replace(/^\/+|\/+$/g,"");
    const title=$("nTitle").value.trim(); const body=$("nBody").value;
    if(!folder||!title)return;
    const slug=title.toLowerCase().replace(/[^a-z0-9çğıöşü\s-]/gi,"").trim().replace(/\s+/g,"-");
    const path=`${CONFIG.rootDir}/${folder}/${slug}.md`;
    const r=await fetch(api(`/contents/${path}`),{method:"PUT",headers:headers(),body:JSON.stringify({message:`note: ${title}`,content:b64(body),branch:BRANCH})});
    if(!r.ok)return toast("save failed",true);
    closeModal(); await loadList(); toast("saved ✓");
  };
}
$("btnNewNote").onclick=()=>newNote();

/* ---------- upload ---------- */
$("btnUpload").onclick=()=>{
  const folders=allFolders();
  openModal(`<h2>Upload file</h2>
    <label>Folder (type to nest)</label>
    <input type="text" id="uFolder" list="folderList" value="${esc(folders[0]||"files")}">
    <datalist id="folderList">${folders.map(f=>`<option value="${esc(f)}">`).join("")}</datalist>
    <div class="hintline">Max ~25 MB per file (GitHub API limit).</div>
    <div class="modal-actions"><button class="btn" id="mCancel">cancel</button><button class="btn primary" id="mPick">choose file…</button></div>`);
  $("mCancel").onclick=closeModal; $("mPick").onclick=()=>$("filePick").click();
};
$("filePick").addEventListener("change",async e=>{
  const file=e.target.files[0]; e.target.value=""; if(!file)return;
  const folder=($("uFolder")?.value||"files").trim().replace(/^\/+|\/+$/g,"");
  const rd=new FileReader();
  rd.onload=async()=>{
    const content=rd.result.split(",")[1];
    const path=`${CONFIG.rootDir}/${folder}/${file.name}`;
    const r=await fetch(api(`/contents/${path}`),{method:"PUT",headers:headers(),body:JSON.stringify({message:`upload: ${file.name}`,content,branch:BRANCH})});
    if(!r.ok)return toast("upload failed",true);
    closeModal(); await loadList(); toast("uploaded ✓");
  };
  rd.readAsDataURL(file);
});

/* ---------- delete ---------- */
async function delFile(path,sha){
  if(!confirm(`Delete "${path}"?`))return;
  if(!sha) sha = await freshSha(path);
  const r=await fetch(api(`/contents/${CONFIG.rootDir}/${path}`),{method:"DELETE",headers:headers(),body:JSON.stringify({message:`delete: ${path}`,sha,branch:BRANCH})});
  if(!r.ok)return toast("delete failed",true);
  await loadList(); toast("deleted ✓");
}

/* get the current blob sha for a file (needed for edit/delete/rename) */
async function freshSha(path){
  try{
    const r=await fetch(api(`/contents/${CONFIG.rootDir}/${path}?_=${Date.now()}`),{headers:headers(),cache:"no-store"});
    if(r.ok){ const j=await r.json(); return j.sha; }
  }catch(e){}
  return null;
}
async function getRaw(path){
  const r=await fetch(api(`/contents/${CONFIG.rootDir}/${path}?_=${Date.now()}`),{headers:headers(),cache:"no-store"});
  if(!r.ok) throw 0;
  return await r.json(); // {content(base64), sha, ...}
}

/* ---------- edit a note in place ---------- */
async function editNote(path, sha){
  let data;
  try{ data=await getRaw(path); }catch(e){ return toast("could not load note",true); }
  const text=fromB64(data.content);
  const title=path.split("/").pop().replace(/\.(md|txt)$/i,"");
  openModal(`<h2>Edit note</h2>
    <label>${esc(path)}</label>
    <textarea id="eBody">${esc(text)}</textarea>
    <div class="modal-actions"><button class="btn" id="mCancel">cancel</button><button class="btn primary" id="mSave">save changes</button></div>`);
  $("mCancel").onclick=closeModal;
  $("mSave").onclick=async()=>{
    const body=$("eBody").value;
    const r=await fetch(api(`/contents/${CONFIG.rootDir}/${path}`),{method:"PUT",headers:headers(),body:JSON.stringify({message:`edit: ${title}`,content:b64(body),sha:data.sha,branch:BRANCH})});
    if(!r.ok)return toast("save failed",true);
    closeModal(); await loadList(); toast("updated ✓");
  };
}

/* ---------- rename a single file (copy to new path, delete old) ---------- */
async function renameFile(path, sha){
  const cur=path.split("/").pop();
  const newName=prompt("New file name (keep the extension):", cur);
  if(!newName||newName===cur)return;
  const dir=path.includes("/")?path.slice(0,path.lastIndexOf("/")+1):"";
  const newPath=dir+newName.trim();
  try{
    const data=await getRaw(path);
    const put=await fetch(api(`/contents/${CONFIG.rootDir}/${newPath}`),{method:"PUT",headers:headers(),body:JSON.stringify({message:`rename: ${path} → ${newPath}`,content:data.content.replace(/\n/g,""),branch:BRANCH})});
    if(!put.ok)throw 0;
    await fetch(api(`/contents/${CONFIG.rootDir}/${path}`),{method:"DELETE",headers:headers(),body:JSON.stringify({message:`rename cleanup: ${path}`,sha:data.sha,branch:BRANCH})});
    await loadList(); toast("renamed ✓");
  }catch(e){ toast("rename failed",true); }
}

/* ---------- rename a folder (move every file under it) ---------- */
async function renameFolder(folder){
  const segs=folder.split("/");
  const newLeaf=prompt(`Rename folder "${segs[segs.length-1]}" to:`, segs[segs.length-1]);
  if(!newLeaf||newLeaf===segs[segs.length-1])return;
  segs[segs.length-1]=newLeaf.trim();
  const newFolder=segs.join("/");
  const affected=ITEMS.filter(it=>it.path===folder+"/.keep"||it.path.startsWith(folder+"/"));
  toast("renaming folder…");
  try{
    for(const it of affected){
      const oldRel = it.placeholder ? folder+"/.gitkeep" : it.path;
      const newRel = oldRel.replace(folder+"/", newFolder+"/");
      const data=await getRaw(oldRel);
      await fetch(api(`/contents/${CONFIG.rootDir}/${newRel}`),{method:"PUT",headers:headers(),body:JSON.stringify({message:`move: ${oldRel} → ${newRel}`,content:data.content.replace(/\n/g,""),branch:BRANCH})});
      await fetch(api(`/contents/${CONFIG.rootDir}/${oldRel}`),{method:"DELETE",headers:headers(),body:JSON.stringify({message:`move cleanup: ${oldRel}`,sha:data.sha,branch:BRANCH})});
    }
    await loadList(); toast("folder renamed ✓");
  }catch(e){ await loadList(); toast("rename partially failed — check repo",true); }
}

/* ---------- delete a whole folder ---------- */
async function delFolder(folder){
  const affected=ITEMS.filter(it=>it.path===folder+"/.keep"||it.path.startsWith(folder+"/"));
  const realCount=affected.filter(it=>!it.placeholder).length;
  if(!confirm(`Delete folder "${folder}" and its ${realCount} file(s)? This cannot be undone.`))return;
  toast("deleting folder…");
  try{
    for(const it of affected){
      const rel = it.placeholder ? folder+"/.gitkeep" : it.path;
      const sha = await freshSha(rel);
      if(sha) await fetch(api(`/contents/${CONFIG.rootDir}/${rel}`),{method:"DELETE",headers:headers(),body:JSON.stringify({message:`delete: ${rel}`,sha,branch:BRANCH})});
    }
    await loadList(); toast("folder deleted ✓");
  }catch(e){ await loadList(); toast("delete partially failed — check repo",true); }
}

/* ---------- init ---------- */
(async function init(){
  const b=$("repoBadge");
  b.textContent=CONFIG.label||"";
  b.className="badge "+(CONFIG.label==="private"?"priv":"pub");
  $("year").textContent=new Date().getFullYear();
  // restore saved admin session
  try{
    const saved=localStorage.getItem(TKEY);
    if(saved && live()){
      TOKEN=saved;
      const r=await fetch(api(""),{headers:headers()});
      if(r.ok){ $("adminActions").hidden=false; }
      else { TOKEN=null; localStorage.removeItem(TKEY); }
    }
  }catch(e){}
  loadList();
})();
</script>
